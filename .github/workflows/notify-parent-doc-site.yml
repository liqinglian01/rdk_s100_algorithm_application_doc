# 子仓库：在 push 到 main 时通知主文档仓库拉取子模块并部署。
# 在主仓库 rdk_s100_os_doc 的 Settings → Secrets and variables → Actions
# 不需要配置；在【本】子仓库的 Secrets 里新增 PARENT_REPO_TOKEN：
#   Classic PAT：勾选 repo；或 Fine-grained：对主仓库 Contents 可读即可触发 dispatch（以 GitHub 文档为准，一般用能访问主仓库的 token）。

name: Notify parent doc site (sync submodules)

on:
  push:
    branches:
      - main

jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repository_dispatch
        env:
          PARENT_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
          PARENT_REPO: liqinglian01/rdk_s100_os_doc
        run: |
          if [ -z "$PARENT_TOKEN" ]; then
            echo "::error::Set secret PARENT_REPO_TOKEN in this repository."
            exit 1
          fi
          curl -sS -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PARENT_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PARENT_REPO}/dispatches" \
            -d "{\"event_type\":\"sync-submodules\",\"client_payload\":{\"source\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\"}}"