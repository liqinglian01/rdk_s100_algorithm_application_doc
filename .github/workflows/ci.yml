# 子仓库：.github/workflows/ci.yml
name: CI 

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Notify that push happened
        run: echo "Push to main completed, will trigger parent sync"